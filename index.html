<!DOCTYPE html>
<html lang="ja">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>好きな画像で動く万華鏡ビューアー</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Serif+JP:wght@200;300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --panel: #ffffff;
  --border: #1e1735;
  --gold: #c9a84c;
  --gold-glow: rgba(201,168,76,0.15);
  --teal: #3dcfc4;
  --text: #ddd4bc;
  --mute: #5a5068;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif JP', serif;
  font-weight: 200;
  overflow: hidden;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  pointer-events: none;
  z-index: 100;
}

.app {
  display: grid;
  grid-template-rows: 52px 1fr;
  height: 100vh;
}

header {
  display: flex;
  align-items: center;
  padding: 0 28px;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
  gap: 10px;
}

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem;
  font-weight: 300;
  color: var(--gold);
  letter-spacing: 0.18em;
}

.logo em {
  font-style: italic;
  color: var(--mute);
  font-size: 0.85em;
  margin-left: 8px;
}

.tagline {
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  color: var(--mute);
}

.status {
  margin-left: auto;
  font-size: 0.63rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--mute);
}

.status.active { color: var(--teal); }

.body {
  display: grid;
  grid-template-columns: 1fr 260px;
  overflow: hidden;
}

.canvas-wrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  overflow: hidden;
}

canvas#output {
  display: block;
  max-width: 100%;
  max-height: 100%;
}

.drop-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  cursor: pointer;
}

.drop-overlay:hover { background: rgba(201,168,76,0.03); }
.drop-overlay.dragover { background: rgba(201,168,76,0.07); }
.drop-overlay.hidden { display: none; }

.drop-overlay input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}

.drop-ring {
  width: 130px; height: 130px;
  border-radius: 50%;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  position: relative;
}

.drop-ring::before {
  content: '';
  position: absolute;
  inset: -10px;
  border-radius: 50%;
  border: 1px dashed rgba(201,168,76,0.25);
  animation: spin 14s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.drop-icon { font-size: 2.8rem; }

.drop-label {
  text-align: center;
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  color: var(--mute);
  line-height: 2;
}

.drop-label strong {
  display: block;
  font-size: 1rem;
  font-weight: 300;
  color: var(--text);
}

.sidebar {
  border-left: 1px solid var(--border);
  background: var(--panel);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.block {
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
}

.block-title {
  font-size: 0.6rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.65;
  margin-bottom: 14px;
}

.thumb-wrap {
  width: 100%;
  aspect-ratio: 1;
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
  background: #000;
  position: relative;
}

.thumb-wrap canvas { width: 100%; height: 100%; object-fit: cover; display: block; }

.thumb-ring {
  position: absolute;
  border: 1px solid rgba(201,168,76,0.5);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.thumb-dot {
  position: absolute;
  width: 5px; height: 5px;
  background: var(--gold);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  box-shadow: 0 0 5px var(--gold);
}

.seg-grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 5px;
}

.seg-btn {
  padding: 7px 0;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--mute);
  font-family: inherit;
  font-size: 0.72rem;
  cursor: pointer;
  transition: all 0.15s;
}

.seg-btn:hover { border-color: var(--gold-glow); color: var(--text); }
.seg-btn.active { border-color: var(--gold); color: var(--gold); background: var(--gold-glow); }

.knobs { display: flex; flex-direction: column; gap: 13px; }
.knob { display: flex; flex-direction: column; gap: 5px; }

.knob-hd {
  font-size: 0.68rem;
  letter-spacing: 0.08em;
  color: var(--mute);
  display: flex;
  justify-content: space-between;
}

.knob-hd span { color: var(--teal); font-variant-numeric: tabular-nums; }

input[type="range"] {
  -webkit-appearance: none;
  width: 100%; height: 2px;
  background: var(--border);
  outline: none;
  cursor: pointer;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--gold);
  cursor: pointer;
  box-shadow: 0 0 6px rgba(201,168,76,0.5);
}

.btn {
  padding: 9px 12px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text);
  font-family: inherit;
  font-size: 0.73rem;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.18s;
  text-align: center;
  width: 100%;
}

.btn + .btn { margin-top: 6px; }
.btn:hover { border-color: var(--mute); background: rgba(0,0,0,0.02); }
.btn.primary { border-color: var(--gold); color: var(--gold); }
.btn.primary:hover { background: var(--gold-glow); }
.btn.muted { border-color: var(--mute); color: var(--mute); }
.btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
</style>
</head>

<body>
<audio id="bgm" src="https://raw.githubusercontent.com/Sekishun/mangekyo/main/omene.mp3" loop preload="auto"></audio>

<div class="app">
  <header>
    <div class="logo">万華鏡 <em>Kaleidoscope</em></div>
    <div class="tagline">好きな写真を動く万華鏡に変換するよ！ 無料・登録不要</div>
    <div class="status" id="statusLabel">画像をドロップ</div>
  </header>

  <div class="body">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="output"></canvas>

      <div class="drop-overlay" id="dropOverlay">
        <input type="file" id="fileInput" accept="image/*">
        <div class="drop-ring">
          <span class="drop-icon">🌸</span>
        </div>
        <div class="drop-label">
          <strong>画像をドロップ</strong>
          またはクリックして選択
        </div>
      </div>
    </div>

    <div class="sidebar">

      <div class="block" id="thumbBlock" style="display:none">
        <div class="block-title">ソース</div>
        <div class="thumb-wrap" id="thumbWrap">
          <canvas id="thumbCanvas"></canvas>
          <div class="thumb-ring" id="thumbRing"></div>
          <div class="thumb-dot" id="thumbDot"></div>
        </div>
      </div>

      <div class="block">
        <div class="block-title">セグメント数</div>
        <div class="seg-grid">
          <button class="seg-btn" data-n="4">4</button>
          <button class="seg-btn" data-n="6">6</button>
          <button class="seg-btn active" data-n="8">8</button>
          <button class="seg-btn" data-n="10">10</button>
          <button class="seg-btn" data-n="12">12</button>
          <button class="seg-btn" data-n="16">16</button>
          <button class="seg-btn" data-n="20">20</button>
          <button class="seg-btn" data-n="24">24</button>
        </div>
      </div>

      <div class="block">
        <div class="block-title">アニメーション</div>
        <div class="knobs">
          <div class="knob">
            <div class="knob-hd">回転の速さ <span id="spinVal">0.40</span></div>
            <input type="range" id="spinSpeed" min="0" max="2" step="0.01" value="0.4">
          </div>
          <div class="knob">
            <div class="knob-hd">流れる速さ <span id="driftVal">0.30</span></div>
            <input type="range" id="driftSpeed" min="0" max="1.5" step="0.01" value="0.3">
          </div>
          <div class="knob">
            <div class="knob-hd">激しさ <span id="zoomVal">0.30</span></div>
            <input type="range" id="zoomAmp" min="0" max="0.8" step="0.01" value="0.3">
          </div>
          <div class="knob">
            <div class="knob-hd">画像のズーム <span id="radiusVal">40%</span></div>
            <input type="range" id="sampleRadius" min="10" max="90" step="1" value="40">
          </div>
        </div>
      </div>

      <div class="block">
        <div class="block-title">操作</div>
        <button class="btn primary" id="pauseBtn" disabled onclick="togglePause()">⏸ 一時停止</button>
        <button class="btn" id="muteBtn" disabled onclick="toggleMute()">🔊 音楽ON</button>
        <button class="btn" id="saveBtn" disabled onclick="saveFrame()">💾 フレーム保存</button>
        <button class="btn" onclick="resetImage()">↩ 画像を変更</button>
      </div>

    </div>
  </div>
</div>

<script>
const outputCanvas = document.getElementById('output');
const ctx = outputCanvas.getContext('2d');
const thumbCanvas = document.getElementById('thumbCanvas');
const thumbCtx = thumbCanvas.getContext('2d');
const dropOverlay = document.getElementById('dropOverlay');
const canvasWrap = document.getElementById('canvasWrap');
const bgm = document.getElementById('bgm');

let img = null;
let animId = null;
let paused = false;
let muted = false;
let segments = 8;

const p = {
  spinSpeed:    0.40,
  driftSpeed:   0.30,
  zoomAmp:      0.30,
  sampleRadius: 0.40,
};

function resize() {
  const s = Math.min(canvasWrap.clientWidth, canvasWrap.clientHeight, 900);
  outputCanvas.width = s;
  outputCanvas.height = s;
}
resize();
window.addEventListener('resize', resize);

document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

canvasWrap.addEventListener('dragover', e => {
  e.preventDefault();
  dropOverlay.classList.add('dragover');
});
canvasWrap.addEventListener('dragleave', () => dropOverlay.classList.remove('dragover'));
canvasWrap.addEventListener('drop', e => {
  e.preventDefault();
  dropOverlay.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadFile(f);
});

function loadFile(file) {
  const url = URL.createObjectURL(file);
  const image = new Image();
  image.onload = () => {
    img = image;
    drawThumb();
    dropOverlay.classList.add('hidden');
    document.getElementById('thumbBlock').style.display = '';
    document.getElementById('pauseBtn').disabled = false;
    document.getElementById('muteBtn').disabled = false;
    document.getElementById('saveBtn').disabled = false;
    document.getElementById('statusLabel').textContent = '実行中';
    document.getElementById('statusLabel').className = 'status active';
    URL.revokeObjectURL(url);
    startLoop();
    // 画像選択がユーザー操作なので自動再生が許可される
    bgm.volume = 1;
    muted = false;
    bgm.play().catch(() => {});
    const muteBtn = document.getElementById('muteBtn');
    muteBtn.textContent = '🔊 音楽ON';
    muteBtn.classList.remove('muted');
  };
  image.src = url;
}

function drawThumb() {
  const W = 220, H = 220;
  thumbCanvas.width = W; thumbCanvas.height = H;
  const ar = img.width / img.height;
  let dw, dh, dx, dy;
  if (ar >= 1) { dh = H; dw = dh * ar; dx = -(dw-W)/2; dy = 0; }
  else          { dw = W; dh = dw/ar;   dx = 0;         dy = -(dh-H)/2; }
  thumbCtx.drawImage(img, dx, dy, dw, dh);
}

function updateThumbRing(nx, ny, nr) {
  const W = thumbCanvas.width, H = thumbCanvas.height;
  const dot  = document.getElementById('thumbDot');
  const ring = document.getElementById('thumbRing');
  const px = nx * W, py = ny * H, r = nr * Math.min(W, H);
  dot.style.left  = px + 'px'; dot.style.top  = py + 'px';
  ring.style.left = px + 'px'; ring.style.top = py + 'px';
  ring.style.width  = r*2 + 'px';
  ring.style.height = r*2 + 'px';
}

function draw(ts) {
  if (!img) return;

  const W = outputCanvas.width;
  const R = W / 2;
  const sliceAngle = (Math.PI * 2) / segments;

  const d = p.driftSpeed * 0.00045;
  const nx = 0.5 + Math.cos(ts * d * 1.00) * 0.22;
  const ny = 0.5 + Math.sin(ts * d * 0.71) * 0.22;

  const zoom = 1 + Math.sin(ts * 0.00038) * p.zoomAmp;
  const sampleR = Math.min(img.width, img.height) * p.sampleRadius * zoom;
  const scale = R / sampleR;
  const sx = nx * img.width;
  const sy = ny * img.height;
  const globalRot = ts * p.spinSpeed * 0.00028;

  updateThumbRing(nx, ny, p.sampleRadius * zoom * 0.48);

  ctx.clearRect(0, 0, W, W);
  ctx.save();
  ctx.translate(R, R);
  ctx.rotate(globalRot);

  for (let i = 0; i < segments; i++) {
    ctx.save();
    ctx.rotate(i * sliceAngle);
    if (i % 2 === 1) ctx.scale(1, -1);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, R + 1, -sliceAngle / 2, sliceAngle / 2);
    ctx.closePath();
    ctx.clip();
    ctx.scale(scale, scale);
    ctx.drawImage(img, -sx, -sy);
    ctx.restore();
  }

  ctx.restore();

  ctx.globalCompositeOperation = 'source-over';
  const vg = ctx.createRadialGradient(R, R, R * 0.6, R, R, R * 1.05);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, W);
}

function loop(ts) {
  if (!paused) draw(ts);
  animId = requestAnimationFrame(loop);
}

function startLoop() {
  if (animId) cancelAnimationFrame(animId);
  paused = false;
  animId = requestAnimationFrame(loop);
}

function togglePause() {
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? '▶ 再生' : '⏸ 一時停止';
  if (paused) { bgm.pause(); }
  else { bgm.play().catch(() => {}); }
}

function toggleMute() {
  muted = !muted;
  bgm.volume = muted ? 0 : 1;
  const btn = document.getElementById('muteBtn');
  btn.textContent = muted ? '🔇 音楽OFF' : '🔊 音楽ON';
  btn.classList.toggle('muted', muted);
}

function saveFrame() {
  const a = document.createElement('a');
  a.download = 'kaleidoscope_' + Date.now() + '.png';
  a.href = outputCanvas.toDataURL();
  a.click();
}

function resetImage() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  bgm.pause();
  bgm.currentTime = 0;
  img = null;
  ctx.clearRect(0, 0, outputCanvas.width, outputCanvas.height);
  dropOverlay.classList.remove('hidden');
  document.getElementById('thumbBlock').style.display = 'none';
  document.getElementById('pauseBtn').disabled = true;
  document.getElementById('muteBtn').disabled = true;
  document.getElementById('saveBtn').disabled = true;
  document.getElementById('statusLabel').textContent = '画像をドロップ';
  document.getElementById('statusLabel').className = 'status';
  document.getElementById('fileInput').value = '';
}

document.querySelectorAll('.seg-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    segments = parseInt(btn.dataset.n);
    document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

function bindRange(id, key, valId, fmt, transform) {
  const el = document.getElementById(id);
  el.addEventListener('input', () => {
    const raw = parseFloat(el.value);
    p[key] = transform ? transform(raw) : raw;
    document.getElementById(valId).textContent = fmt(raw);
  });
}

bindRange('spinSpeed',    'spinSpeed',    'spinVal',    v => v.toFixed(2));
bindRange('driftSpeed',   'driftSpeed',   'driftVal',   v => v.toFixed(2));
bindRange('zoomAmp',      'zoomAmp',      'zoomVal',    v => v.toFixed(2));
bindRange('sampleRadius', 'sampleRadius', 'radiusVal',  v => v + '%', v => v / 100);
</script>
</body>
</html>
